server:
  port: 8080

spring:
  application:
    name: hai-api
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/haiapi
    username: haiapi
    password: haiapi123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000

jwt:
  secret: ${JWT_SECRET:hai-api-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.haiapi.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
    com.haiapi: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
